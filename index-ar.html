<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>خيارات تقسيم مربع 19</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<script src="blocks-data.js"></script>
<style>
  :root {
    --color-unallocated: #d9d9d9;
    --color-blue: #1f6fb5;
    --color-yellow: #f5c518;

    --surface: #ffffff;
    --surface-2: #f6f8fb;
    --border: #e3e8ef;
    --text: #1e2530;
    --text-muted: #6b7787;
    --accent: #0d9488;
    --accent-dark: #0f766e;
    --accent-soft: #e3f6f3;
    --danger: #e0524a;
    --danger-soft: #fdeceb;

    --radius-lg: 18px;
    --radius-md: 12px;
    --radius-sm: 8px;
    --shadow-sm: 0 1px 2px rgba(15,23,42,0.06);
    --shadow-md: 0 8px 22px -6px rgba(15,23,42,0.16), 0 2px 6px rgba(15,23,42,0.06);
    --shadow-lg: 0 24px 60px -16px rgba(15,23,42,0.30);
  }
  * { box-sizing: border-box; }
  body {
    font-family: "Tajawal", "Segoe UI", Tahoma, Arial, sans-serif;
    margin: 0;
    min-height: 100vh;
    padding: 30px 16px 50px;
    background:
      radial-gradient(circle at 12% -5%, rgba(13,148,136,0.10) 0%, transparent 50%),
      radial-gradient(circle at 100% 0%, rgba(245,197,24,0.14) 0%, transparent 45%),
      #eef1f6;
    color: var(--text);
  }
  .app-header {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    margin-bottom: 26px;
  }
  .app-header .icon-badge {
    width: 46px;
    height: 46px;
    border-radius: var(--radius-md);
    background: var(--accent-soft);
    color: var(--accent-dark);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: var(--shadow-sm);
    margin-bottom: 4px;
  }
  h1 {
    text-align: center;
    margin: 0;
    font-size: 26px;
    font-weight: 800;
    letter-spacing: .2px;
  }
  .app-subtitle {
    margin: 0;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    text-align: center;
  }
  .main {
    display: flex;
    flex-wrap: wrap;
    gap: 24px;
    justify-content: center;
    align-items: flex-start;
  }
  .left-panel {
    display: flex;
    flex-direction: column;
    gap: 18px;
    min-width: 460px;
  }
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px 18px;
    box-shadow: var(--shadow-sm);
  }
  .panel h2 {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    font-weight: 700;
    margin: 0 0 12px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .panel h2 .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }
  table {
    border-collapse: collapse;
    width: 100%;
    font-size: 13px;
  }
  table th, table td {
    border: none;
    border-bottom: 1px solid var(--border);
    padding: 7px 8px;
  }
  table th:first-child, table td:first-child {
    text-align: right;
  }
  table thead th {
    background: var(--surface-2);
    color: var(--text-muted);
    font-weight: 700;
    font-size: 11.5px;
    border-bottom: 2px solid var(--border);
  }
  table tbody tr:hover {
    background: var(--surface-2);
  }
  table tfoot td {
    font-weight: 800;
    background: var(--accent-soft);
    color: var(--accent-dark);
    border-top: 2px solid var(--accent);
    border-bottom: none;
  }
  table input[type="number"] {
    width: 70px;
    text-align: right;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 6px;
    font-family: inherit;
    background: #fff;
    transition: border-color .15s, box-shadow .15s;
  }
  table input[type="number"]:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(13,148,136,0.15);
  }
  .grid-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 18px;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 12px 18px;
    box-shadow: var(--shadow-sm);
  }
  .control-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .control-group span {
    font-size: 12.5px;
    font-weight: 700;
    color: var(--text-muted);
  }
  button {
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface-2);
    color: var(--text);
    border-radius: 999px;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 700;
    font-family: inherit;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    box-shadow: var(--shadow-sm);
    transition: transform .12s ease, box-shadow .12s ease, background .12s ease, color .12s ease, border-color .12s ease;
  }
  button:hover {
    transform: translateY(-1px);
    box-shadow: var(--shadow-md);
    background: #fff;
  }
  button:active {
    transform: translateY(0);
  }
  .swatch-dot {
    width: 11px;
    height: 11px;
    border-radius: 50%;
    display: inline-block;
    border: 1px solid rgba(0,0,0,0.15);
    flex-shrink: 0;
  }
  button.color-btn[data-color="blue"].active {
    background: var(--color-blue);
    color: #fff;
    border-color: var(--color-blue);
    box-shadow: 0 6px 16px -4px rgba(31,111,181,0.45);
  }
  button.color-btn[data-color="yellow"].active {
    background: var(--color-yellow);
    color: #3a2e00;
    border-color: var(--color-yellow);
    box-shadow: 0 6px 16px -4px rgba(245,197,24,0.5);
  }
  #resetBtn {
    background: var(--danger-soft);
    color: var(--danger);
    border-color: rgba(224,82,74,0.3);
  }
  #resetBtn:hover {
    background: var(--danger);
    color: #fff;
  }
  #exportBtn {
    background: var(--accent-soft);
    color: var(--accent-dark);
    border-color: rgba(13,148,136,0.3);
  }
  #exportBtn:hover {
    background: var(--accent);
    color: #fff;
  }
  .grid-wrap {
    width: min(900px, 92vw);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-md);
    padding: 14px;
  }
  .grid {
    position: relative;
    width: 100%;
    display: grid;
    border-top: 1px solid var(--border);
    border-left: 6px solid var(--text);
    border-right: 6px solid var(--text);
    border-bottom: 6px solid var(--text);
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
  }
  .block {
    position: relative;
    border: 1px solid rgba(30,37,48,0.15);
    background: var(--color-unallocated);
    transition: background-color 0.08s, box-shadow 0.08s;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    line-height: 1.1;
    padding: 1px;
    direction: ltr;
    cursor: pointer;
  }
  .block:hover {
    box-shadow: inset 0 0 0 2px rgba(13,148,136,0.6);
    z-index: 2;
  }
  .block.color-unallocated { background: var(--color-unallocated); }
  .block.color-blue { background: var(--color-blue); }
  .block.color-yellow { background: var(--color-yellow); }
  .block .label-id {
    font-size: 8px;
    font-weight: 700;
    white-space: nowrap;
  }
  .block .label-sqm {
    font-size: 7px;
    white-space: nowrap;
  }
  .block.color-unallocated .label-id,
  .block.color-unallocated .label-sqm { color: rgba(0,0,0,0.55); }
  .block.color-yellow .label-id,
  .block.color-yellow .label-sqm { color: rgba(0,0,0,0.65); }
  .block.color-blue .label-id,
  .block.color-blue .label-sqm { color: rgba(255,255,255,0.92); }
  .street-bar {
    background: var(--text);
    background-image: linear-gradient(135deg, #2a3342, #1e2530);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: .3px;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
  }
  .street-bar.vertical {
    writing-mode: vertical-rl;
    text-orientation: mixed;
  }
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    align-items: center;
    justify-content: center;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--text-muted);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 10px 18px;
    box-shadow: var(--shadow-sm);
  }
  .legend .swatch {
    display: inline-block;
    width: 13px;
    height: 13px;
    border-radius: 4px;
    border: 1px solid rgba(0,0,0,0.15);
    vertical-align: middle;
    margin-left: 6px;
    box-shadow: var(--shadow-sm);
  }
  .slots-panel {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 14px 18px;
    box-shadow: var(--shadow-sm);
  }
  .slots-panel label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
  }
  .slots-panel select, .slots-panel input[type="text"] {
    font-size: 13px;
    padding: 7px 10px;
    font-family: inherit;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: #fff;
    color: var(--text);
    transition: border-color .15s, box-shadow .15s;
  }
  .slots-panel select:focus, .slots-panel input[type="text"]:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(13,148,136,0.15);
  }
  #statusMsg {
    min-height: 18px;
    font-size: 12.5px;
    font-weight: 700;
    color: var(--accent-dark);
    text-align: center;
  }
  body.locked h1, body.locked .main, body.locked .app-header {
    display: none;
  }
  .gate-overlay {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 15% 10%, rgba(13,148,136,0.12) 0%, transparent 50%),
      radial-gradient(circle at 100% 90%, rgba(245,197,24,0.16) 0%, transparent 45%),
      #eef1f6;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
  }
  .gate-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 32px 34px;
    text-align: center;
    box-shadow: var(--shadow-lg);
    min-width: 260px;
    max-width: 320px;
  }
  .gate-card .icon-badge {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: var(--accent-soft);
    color: var(--accent-dark);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
  }
  .gate-card p {
    margin: 0 0 16px;
    font-size: 14.5px;
    font-weight: 600;
    color: var(--text);
  }
  .gate-card input[type="password"] {
    font-size: 14px;
    padding: 10px 12px;
    width: 100%;
    margin-bottom: 12px;
    font-family: inherit;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    transition: border-color .15s, box-shadow .15s;
  }
  .gate-card input[type="password"]:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(13,148,136,0.15);
  }
  .gate-card button {
    display: block;
    width: 100%;
    margin-top: 4px;
    font-family: inherit;
    justify-content: center;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    padding: 10px;
    box-shadow: none;
  }
  .gate-card button:hover {
    background: var(--accent-dark);
    transform: none;
  }
  .gate-error {
    color: var(--danger);
    font-weight: 700;
    font-size: 12px;
    min-height: 16px;
    margin-top: 8px;
  }
  @media (max-width: 600px) {
    body { padding: 18px 10px 36px; }
    h1 { font-size: 20px; }
    .left-panel { min-width: 0; width: 100%; }
    .controls, .slots-panel { padding: 10px 12px; gap: 10px; }
  }
</style>
</head>
<body class="locked">

<div id="gateOverlay" class="gate-overlay">
  <div class="gate-card">
    <div class="icon-badge">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 1 1 8 0v4"/></svg>
    </div>
    <p>هذه الصفحة محمية بكلمة مرور.</p>
    <form id="gateForm">
      <input type="password" id="gatePassword" placeholder="كلمة المرور" autocomplete="off" />
      <button type="submit">دخول</button>
    </form>
    <div id="gateError" class="gate-error"></div>
  </div>
</div>

<script>
(function () {
  "use strict";
  var PASSWORD = "191919";
  var STORAGE_KEY = "box19_unlocked";
  var overlay = document.getElementById("gateOverlay");
  var form = document.getElementById("gateForm");
  var input = document.getElementById("gatePassword");
  var error = document.getElementById("gateError");

  function unlock() {
    document.body.classList.remove("locked");
    overlay.style.display = "none";
  }

  if (localStorage.getItem(STORAGE_KEY) === "1") {
    unlock();
  }

  form.addEventListener("submit", function (e) {
    e.preventDefault();
    if (input.value === PASSWORD) {
      localStorage.setItem(STORAGE_KEY, "1");
      unlock();
    } else {
      error.textContent = "كلمة المرور غير صحيحة.";
      input.value = "";
      input.focus();
    }
  });
})();
</script>

<div class="app-header">
  <div class="icon-badge">
    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>

</div>

<div class="main">

<script>
(function () {
  "use strict";

  var GROUPS = ["salman", "thirty six", "aziz", "houses", "services"];
  var GROUP_LABELS = {
    salman: "طريق الملك سلمان", "thirty six": "شارع 36م", aziz: "طريق الملك عبدالعزيز",
    houses: "سكني", services: "خدمات"
  };
  var SLOT_COUNT = 10;
  var STORAGE_KEY = "box19_slots_v2_ar";
  var DEFAULT_PRICES = {
    salman: 9000, "thirty six": 5400, aziz: 7000,
    houses: 4800, services: 4800
  };

  var blocks = BLOCKS.map(function (b) {
    return {
      id: b.id, sqm: b.sqm, group: b.group, color: b.color,
      row_start: b.row_start, row_end: b.row_end,
      col_start: b.col_start, col_end: b.col_end,
      el: null
    };
  });
  var blocksById = new Map();
  blocks.forEach(function (b) { blocksById.set(b.id, b); });

  var prices = {};
  GROUPS.forEach(function (g) { prices[g] = DEFAULT_PRICES[g]; });

  var activeColor = "blue";

  var gridEl = document.getElementById("grid");

  var COL_PX_PER_UNIT = 7;
  var ROW_PX_PER_PT = 1.3333;
  var totalColPx = COL_WIDTHS.reduce(function (s, w) { return s + w; }, 0) * COL_PX_PER_UNIT;
  var totalRowPx = ROW_HEIGHTS.reduce(function (s, h) { return s + h; }, 0) * ROW_PX_PER_PT;
  gridEl.style.aspectRatio = (totalColPx / totalRowPx).toFixed(4);
  gridEl.style.gridTemplateColumns = COL_WIDTHS.map(function (w) { return w + "fr"; }).join(" ");
  gridEl.style.gridTemplateRows = ROW_HEIGHTS.map(function (h) { return h + "fr"; }).join(" ");

  function buildGridDOM() {
    STREETS.forEach(function (s) {
      var bar = document.createElement("div");
      var vertical = s.col_end - s.col_start < s.row_end - s.row_start;
      bar.className = "street-bar" + (vertical ? " vertical" : "");
      bar.textContent = GROUP_LABELS[s.name] || s.name;
      bar.style.gridColumn = s.col_start + " / " + s.col_end;
      bar.style.gridRow = s.row_start + " / " + s.row_end;
      gridEl.appendChild(bar);
    });

    blocks.forEach(function (b) {
      var cell = document.createElement("div");
      cell.className = "block color-unallocated";
      cell.dataset.id = b.id;
      cell.style.gridColumn = b.col_start + " / " + b.col_end;
      cell.style.gridRow = b.row_start + " / " + b.row_end;
      cell.title = b.id + " - " + b.sqm + " m2";

      var idLabel = document.createElement("span");
      idLabel.className = "label-id";
      idLabel.textContent = b.id;
      cell.appendChild(idLabel);

      var sqmLabel = document.createElement("span");
      sqmLabel.className = "label-sqm";
      sqmLabel.textContent = b.sqm + " m²";
      cell.appendChild(sqmLabel);

      gridEl.appendChild(cell);
      b.el = cell;
    });
  }

  function updateGridColors() {
    blocks.forEach(function (b) {
      b.el.classList.remove("color-unallocated", "color-blue", "color-yellow");
      b.el.classList.add("color-" + b.color);
    });
  }

  function sumSqm(list) {
    return list.reduce(function (s, b) { return s + b.sqm; }, 0);
  }

  var areaTbody = document.querySelector("#areaTable tbody");
  var valueTbody = document.querySelector("#valueTable tbody");
  var rowCells = {};

  GROUPS.forEach(function (g) {
    var areaTr = document.createElement("tr");
    areaTr.innerHTML =
      "<td>" + GROUP_LABELS[g] + "</td>" +
      '<td data-c="unalloc">0</td>' +
      '<td data-c="blue">0</td>' +
      '<td data-c="yellow">0</td>' +
      '<td data-c="total">0</td>';
    areaTbody.appendChild(areaTr);

    var valueTr = document.createElement("tr");
    valueTr.innerHTML =
      "<td>" + GROUP_LABELS[g] + "</td>" +
      '<td><input type="number" min="0" step="any" data-price-for="' + g + '" value="' + DEFAULT_PRICES[g] + '" /></td>' +
      '<td data-c="unalloc">0</td>' +
      '<td data-c="blue">0</td>' +
      '<td data-c="yellow">0</td>' +
      '<td data-c="total">0</td>';
    valueTbody.appendChild(valueTr);

    rowCells[g] = {
      area: {
        unalloc: areaTr.querySelector('[data-c="unalloc"]'),
        blue: areaTr.querySelector('[data-c="blue"]'),
        yellow: areaTr.querySelector('[data-c="yellow"]'),
        total: areaTr.querySelector('[data-c="total"]')
      },
      value: {
        unalloc: valueTr.querySelector('[data-c="unalloc"]'),
        blue: valueTr.querySelector('[data-c="blue"]'),
        yellow: valueTr.querySelector('[data-c="yellow"]'),
        total: valueTr.querySelector('[data-c="total"]')
      },
      priceInput: valueTr.querySelector("input")
    };
  });

  valueTbody.addEventListener("input", function (e) {
    var g = e.target.getAttribute("data-price-for");
    if (!g) return;
    var v = parseFloat(e.target.value);
    prices[g] = isNaN(v) ? 0 : v;
    renderTables();
  });

  var fmt = function (n) { return Math.round(n).toLocaleString(); };

  function renderTables() {
    var allUnalloc = 0, allBlue = 0, allYellow = 0, allTotal = 0;
    var allVUnalloc = 0, allVBlue = 0, allVYellow = 0, allVTotal = 0;

    GROUPS.forEach(function (g) {
      var list = blocks.filter(function (b) { return b.group === g; });
      var unalloc = sumSqm(list.filter(function (b) { return b.color === "unallocated"; }));
      var blue = sumSqm(list.filter(function (b) { return b.color === "blue"; }));
      var yellow = sumSqm(list.filter(function (b) { return b.color === "yellow"; }));
      var total = unalloc + blue + yellow;

      var cells = rowCells[g];
      cells.area.unalloc.textContent = fmt(unalloc);
      cells.area.blue.textContent = fmt(blue);
      cells.area.yellow.textContent = fmt(yellow);
      cells.area.total.textContent = fmt(total);

      var price = prices[g] || 0;
      var vUnalloc = unalloc * price, vBlue = blue * price, vYellow = yellow * price, vTotal = total * price;
      cells.value.unalloc.textContent = fmt(vUnalloc);
      cells.value.blue.textContent = fmt(vBlue);
      cells.value.yellow.textContent = fmt(vYellow);
      cells.value.total.textContent = fmt(vTotal);

      allUnalloc += unalloc; allBlue += blue; allYellow += yellow; allTotal += total;
      allVUnalloc += vUnalloc; allVBlue += vBlue; allVYellow += vYellow; allVTotal += vTotal;
    });

    document.getElementById("area-all-unalloc").textContent = fmt(allUnalloc);
    document.getElementById("area-all-blue").textContent = fmt(allBlue);
    document.getElementById("area-all-yellow").textContent = fmt(allYellow);
    document.getElementById("area-all-total").textContent = fmt(allTotal);

    document.getElementById("value-all-unalloc").textContent = fmt(allVUnalloc);
    document.getElementById("value-all-blue").textContent = fmt(allVBlue);
    document.getElementById("value-all-yellow").textContent = fmt(allVYellow);
    document.getElementById("value-all-total").textContent = fmt(allVTotal);
  }

  function paintCell(b, color) {
    if (b.color !== color) {
      b.color = color;
      b.el.classList.remove("color-unallocated", "color-blue", "color-yellow");
      b.el.classList.add("color-" + color);
      renderTables();
    }
  }

  gridEl.addEventListener("pointerdown", function (e) {
    var blockEl = e.target.closest(".block");
    if (!blockEl) return;
    e.preventDefault();
    var b = blocksById.get(blockEl.dataset.id);
    if (b) paintCell(b, activeColor);
  });

  document.querySelectorAll(".color-btn").forEach(function (btn) {
    btn.addEventListener("click", function () {
      document.querySelectorAll(".color-btn").forEach(function (b) { b.classList.remove("active"); });
      btn.classList.add("active");
      activeColor = btn.dataset.color;
    });
  });

  document.getElementById("resetBtn").addEventListener("click", function () {
    if (!confirm("هل تريد مسح جميع الألوان؟")) return;
    blocks.forEach(function (b) { b.color = "unallocated"; });
    updateGridColors();
    renderTables();
    showStatus("تم مسح جميع الألوان.");
  });

  document.getElementById("exportBtn").addEventListener("click", function () {
    var lines = ["code,group,sqm,color"];
    blocks.forEach(function (b) {
      lines.push([b.id, b.group, b.sqm, b.color].join(","));
    });
    var blob = new Blob([lines.join("\n")], { type: "text/csv;charset=utf-8;" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "block19_export.csv";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showStatus("تم تصدير الملف.");
  });

  // ---- Save / Load slots ----
  var slotSelect = document.getElementById("slotSelect");
  var slotNameInput = document.getElementById("slotName");
  var statusMsg = document.getElementById("statusMsg");
  var statusTimer = null;

  function showStatus(msg) {
    statusMsg.textContent = msg;
    if (statusTimer) clearTimeout(statusTimer);
    statusTimer = setTimeout(function () { statusMsg.textContent = ""; }, 3500);
  }

  function loadSlots() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return new Array(SLOT_COUNT).fill(null);
      var parsed = JSON.parse(raw);
      if (!Array.isArray(parsed) || parsed.length !== SLOT_COUNT) return new Array(SLOT_COUNT).fill(null);
      return parsed;
    } catch (e) {
      return new Array(SLOT_COUNT).fill(null);
    }
  }

  function persistSlots(slots) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(slots));
  }

  var slots = loadSlots();

  function populateSlotSelect() {
    var prevValue = slotSelect.value;
    slotSelect.innerHTML = "";
    slots.forEach(function (slot, idx) {
      var opt = document.createElement("option");
      opt.value = idx;
      opt.textContent = (idx + 1) + ": " + (slot ? slot.name : "(فارغ)");
      slotSelect.appendChild(opt);
    });
    if (prevValue !== "" && prevValue !== null) slotSelect.value = prevValue;
    syncNameInput();
  }

  function syncNameInput() {
    var idx = parseInt(slotSelect.value, 10);
    var slot = slots[idx];
    slotNameInput.value = slot ? slot.name : "";
  }

  slotSelect.addEventListener("change", syncNameInput);

  document.getElementById("saveBtn").addEventListener("click", function () {
    var idx = parseInt(slotSelect.value, 10);
    var name = slotNameInput.value.trim() || ("خيار " + (idx + 1));
    var colors = {};
    blocks.forEach(function (b) { colors[b.id] = b.color; });
    slots[idx] = { name: name, colors: colors, prices: Object.assign({}, prices), savedAt: Date.now() };
    persistSlots(slots);
    populateSlotSelect();
    slotSelect.value = idx;
    showStatus('تم الحفظ في الخانة ' + (idx + 1) + ' باسم "' + name + '".');
  });

  document.getElementById("loadBtn").addEventListener("click", function () {
    var idx = parseInt(slotSelect.value, 10);
    var slot = slots[idx];
    if (!slot) { showStatus("الخانة " + (idx + 1) + " فارغة."); return; }
    blocks.forEach(function (b) {
      b.color = slot.colors[b.id] || "unallocated";
    });
    GROUPS.forEach(function (g) {
      if (slot.prices && typeof slot.prices[g] === "number") {
        prices[g] = slot.prices[g];
        rowCells[g].priceInput.value = slot.prices[g];
      }
    });
    updateGridColors();
    renderTables();
    showStatus('تم فتح "' + slot.name + '" من الخانة ' + (idx + 1) + ".");
  });

  document.getElementById("deleteBtn").addEventListener("click", function () {
    var idx = parseInt(slotSelect.value, 10);
    if (!slots[idx]) { showStatus("الخانة " + (idx + 1) + " فارغة بالفعل."); return; }
    if (!confirm('هل تريد حذف الخانة ' + (idx + 1) + ' ("' + slots[idx].name + '")؟')) return;
    slots[idx] = null;
    persistSlots(slots);
    populateSlotSelect();
    showStatus("تم حذف الخانة " + (idx + 1) + ".");
  });

  buildGridDOM();
  updateGridColors();
  renderTables();
  populateSlotSelect();
})();
</script>
</body>
</html>
